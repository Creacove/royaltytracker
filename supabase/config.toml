[auth]
# Dev-friendly auth: disable email confirmations so signup can immediately sign in.
# For production, re-enable confirmations and configure SMTP.
# Used for auth redirects (password recovery, magic links, etc.).
# Keep this aligned with live app origins and local dev.
site_url = "https://desk.ordersounds.com"
additional_redirect_urls = ["http://localhost:8080/**", "https://desk.ordersounds.com/**"]
enable_signup = false

[auth.email]
# If enabled, users need to confirm their email address before signing in.
# For now we disable confirmations to unblock local development.
enable_confirmations = false

# Restore sane defaults for email OTP.
max_frequency = "1m0s"
otp_length = 8

[auth.mfa.totp]
# Keep TOTP MFA available (was unintentionally disabled by a config push).
enroll_enabled = true
verify_enabled = true

